{% extends 'base.html' %}
{% block content %}
<div class="card" style="max-width:520px;margin:20px auto;">
  <h2>Cambiar contraseña</h2>
  {% if force %}<p class="muted">Tu contraseña venció. Debes cambiarla para seguir.</p>{% endif %}
  <form method="post">
    <div style="margin-bottom:10px"><label>Contraseña actual</label><input type="password" name="current_password" required></div>
    <div style="margin-bottom:10px"><label>Nueva contraseña</label><input type="password" name="new_password" required></div>
    <div style="margin-bottom:10px"><label>Confirmar nueva contraseña</label><input type="password" name="confirm_password" required></div>
    <button class="btn" type="submit">Guardar cambio</button>
  </form>
</div>
{% endblock %}
